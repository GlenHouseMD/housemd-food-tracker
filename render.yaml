services:
  - type: web
    name: housemd-food-tracker
    runtime: node
    region: oregon
    plan: free
    nodeVersion: "20"
    buildCommand: npm install && npm rebuild better-sqlite3 && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
